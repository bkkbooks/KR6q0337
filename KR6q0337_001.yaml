body:
  text: 兀菴和尚初住慶元府象山靈巖廣福禪院語録侍者淨韵編指三門迷悟兩門聖凡二路以手劃一劃云總與諸人開闢了也普請一時證入佛殿一釋迦二元和三佛陀當甚碗脫丘然雖如是仁義道中便燒香禮拜據方丈橫按拄杖云莫有不顧危亡底麼良久云果然拈帖云從上來被這些子一把把定更無轉身吐氣處寧上座尋常一味橫點頭到此盡平生伎倆也擺脫不下且道因甚如此公道已行指法座坐斷千差當陽烜赫任是須彌燈王也須望空斫額升座祝聖次祝州縣香次云此一瓣香生無陰陽之地出絶思慮之鄉軟頑中軟頑惡辣中惡辣無端一回嗅著直得喪盡平生今日人天衆前當陽爇却奉為見住徑山佛鑑圓照禪師大和尚用酬法乳據坐問答不録乃云釋迦不出世四十九年說祖師不西來少林有妙訣所以道法無去來無動轉相昨朝乳竇今日靈巖曾無動轉之跡寧有去來之跡如是則從上佛祖眼睛天下衲僧鼻孔驀拈拄杖卓一下云總被山僧拄杖子一時穿却盡乾坤大地更無纖毫透漏雖然且道功歸何所靠主丈云四海浪平龍睡穩九天雲靜鶴飛高復舉三聖道我逢人即出出即不為人興化道我逢人則不出出則便為人拈云二大老一人先行不到一人末後太過檢點將來總缺一著寧上座寄跡巖竇隱遁過時無端被人推將出來做這舉止出則出已且道為人不為人乃云信手斫方圓自然合規矩當晚小參如來唯一說無二說祖師唯心傳無別傳所以道垂鈎四海只鈎獰龍格外玄機為尋知己雖然且據令一句又作麼生朔風捲地百草死芙蓉著花生晚寒復舉德山小參示衆云今夜不答話時有僧出德山便打僧云某甲話也未問因甚打某甲山云你是甚處人僧云新羅人山云未跨船舷好與三十棒拈云德山老漢能放不能收能殺不能活當時若要盡令直須棒了趂出徑山付法衣到師拈起法衣召大衆云大庾嶺頭提不起因什麼却在靈巖手中諸人還知端的麼若也知得便知道從上來佛佛授手祖祖相傳的的無私繩繩有準其或未知便舉法衣云這箇是徑山圓照老人親手付來底便披上堂召大衆云披野干皮作獅子吼指東為西將無作有驚起法身藏北斗喝一喝下座結制上堂過去諸如來斯門已成就錯見在諸菩薩今各亦圓明錯未來修學人應當如是學錯諸人還知這三錯落處麼若也知得不妨同此安居其或未然且聽從頭指出一錯點開從上佛祖眼睛一錯捩轉天下衲僧鼻孔且道更有一錯作麼生驀拈拄杖云拄杖子莫道得麼試出來將錯就錯道看卓一下云餿飯泥茶爐上堂云教中道離言說相離文字相離心緣相畢竟平等無有變易驀召大衆云這般說話蝦跳何曾出得斗向衲僧門下猶隔重關畢竟事作麼生荷葉團團團似鏡菱角尖尖尖似錐風吹抑絮毛毬走雨打梨花蛺蝶飛中夏上堂云一夏九十日不覺已過半管帶牯牛兒切忌隨物轉緊把鼻頭索莫放令寬緩如是十二時時時無間斷收得純熟斥之不去受人言語不動不變覿面當機當機覿面必竟如何良久云不得動著動著則頭角生解制小參目前無法意在目前東西十萬南北八千所以達磨不來東土二祖不往西天點檢將來只見一邊設使東去西去直向萬里無寸草處去大似泥裏推車陸地行船直饒總道出門便是草雖則君子千里同風未免隔山見烟爭如任運騰騰騰騰任運飢餐渴飲行坐困眠自然處處朝宗頭頭合轍縱橫得妙八穴七穿且總不任麼又作麼生拍膝一下云不覺日又夜爭教人少年復舉僧問雲門秋初夏末東去西去前途或有人問如何祗對雲門云大衆退後僧云某甲過在甚處雲門云還我九十日飯錢來師拈云雲門老漢當斷不斷返招其亂當時才問擘脊便棒待它道某甲過在甚處却向道逢人不得錯舉道舊至上堂召大衆云沒絃琴指趣深尖新曲調須遇知音知音既遇試彈一操去也遂橫拄杖作撫琴勢云會麼高山流水無窮意落落斷崖千萬尋上堂召大衆云寒食清明節家家拜掃時木人空嘆息石女泪雙垂惟有林下道人絶學無為百不會百不知拈起少林無孔笛逆風吹了順風吹好大哥結制上堂諸方安居結制靈巖結制安居雖是一般規矩於中大有差殊作麼生趙州東壁掛葫蘆端午上堂拈拄杖示衆云拄杖子無偏黨遍界不曾藏通身無影像左邊卓一下云妖怪盡勦除右邊卓一下云佛魔俱掃蕩掃蕩後如何擲下主丈云普天皇道無遮障徑山圓照先師訃音至上堂召大衆云頑處非常放軟頑偏能陸地要撑船驀然撐向龍門去蹤跡不知往那邊幾多望斷空惆悵亦復嗟嘆泪潸然拍禪床一下云安得鸞膠續斷絃舉哀召大衆云我有一句子不封亦不樹不在舌頭邊亦非思憶處諸人若要知得親切徑山圓照老人即今在汝諸人眼睫上放大光明肆口宣說急須諦聽其或未然蒼天中哭蒼天祈雨感應上堂拈拄杖示衆云拄杖子化為龍拏雲霧妙應難窮霈然洪霔四海皆通五穀結實萬物歸功鼓腹謳歌忘世事以拄杖打圓相云太陽依舊海門東擲下主丈下座解夏小參直下猶難會尋言轉更賒若言佛與祖特地隔天涯便任麼承當已是不堪持論那更休夏自恣取驗蠟人也大屈哉靈巖恁麼告報莫有猛省底麼拍禪床一下云無端夜來鴈驚起後池秋復舉巴陵示衆云不是風動不是幡動既不是風幡向甚處著有人與祖師作主出來與巴陵相見後來雪竇道是風動是幡動既是風幡向甚處著有人與巴陵作主出來與雪竇相見師拈云總道二古德互相擊揚金聲玉振耀古騰今殊不知一人太儉一人太奢有人與二老宿作主出來與靈巖相見建閣謝修造上堂拆東籬補西壁從空架空以楔出楔他時聳壑昂霄須信不勞餘力這般說話直是好笑何故才方搓彈子便要揑金剛下座上堂舉僧問巴陵祖意教意是同是別巴陵云雞寒上樹鴨寒下水圓照老師道川僧藞苴浙僧瀟灑師拈云二老雖則各擅家風其奈優劣不等靈巖也有箇道處或問祖意教意是同是別只向道鳶飛戾天魚躍于囦上堂拈拄杖示衆云山僧昨日入邑滿散於無心中收得一物非長短方圓亦非青黃赤白賤則價重娑婆貴則分文不直不敢囊藏今日歸來不免擊鼓升堂與諸人平分去也卓一下云一加三二添六擲下云收浴佛上堂舉藥山因遵布衲殿主浴佛次藥山問云你只浴得這箇還浴得那箇麼遵云且將那箇來藥山休去師拈云藥山老漢才開臭口便見鄉談引得布衲隨邪逐惡當時待它恁麼道但舀香湯浴佛管取藥山開口了合不得靈巖不問你這箇那箇今日正當四月八敢保諸人未曾夢見山僧蓋膽毛在住常州無錫南禪福聖寺語録侍者清澤編指三門我此門風孤危不立若是臨濟兒孫便請單刀直入喝一喝佛殿釋迦彌勒是他奴他是阿誰插香云且看四稜踏地時大聖殿出現在楊州留錫於此地寶塔凌高空聲光動萬里利物應群機如月分衆水我來爇瓣香一瞻一頂禮從教人道自倒還自起據方丈橫按拄杖召大衆云山僧坐地待汝搆去良久云諸人還覺頂門重麼擲拄杖便起拈漕帖此是都運殿撰侍郎幹旋造化掌握乾坤於無心中當陽拈出令未信者信未聞者聞山僧頂戴奉行誰不伏聽處分指法座向上一路滑壁立千仞險南禪不立階級直與當頭坐斷祝聖次祝州縣香據坐問答不録乃云靈山的旨少室真機孤逈逈生風颯颯地直得超情離見蓋色騎聲揑聚放開無適不可所以居海岸則時聞潮落潮生潮聲浩浩寓梁溪則但見上載下載來往憧憧賓主交參風雲會合正恁麼時如何通信良久云洞庭七十二峰青舉鳥窠和尚因白侍郎問如何是佛法大意鳥窠云諸惡莫作衆善奉行侍郎云三歲孩兒也解恁麼道窠云三歲孩兒雖道得八十老翁行不得師拈云侍郎手擎仲尼日月腰佩毗盧金印等間通箇消息逈出常流鳥窠雖則當機直截其奈易見難明諸人還知古德為人處麼擘開華嶽連天秀放出黃河一派清當晚小參折腳鐺破木杓無柄霸難摸索橫拈倒用破二作三正按傍提七穿八穴靈山密付之後少室單傳以來的的無私繩繩有準若以正眼觀之當甚間家破具雖然此意分明誰共委相同扶起舊家風復舉芭蕉和尚僧問不落諸緣請師直指蕉云有問有答拈云芭蕉接物應機頗善平高就下子細檢點將來未免拖泥帶水若問南禪不落諸緣請師直指拈棒便打若稍如痛癢必不辜恩負德歲夜小參心隨萬境轉轉處實能幽隨流認得性無喜亦無憂山僧官差不自由只得隨流入流所以新來乍到未知井竈郎忙送舊迎新未暇改聲換調廚乏聚蠅之糝囊無繫蟻之絲內空外空內外空多憂多慮多煩惱年已盡歲已除窮廝煎餓廝吵露柱暗攢眉燈籠拍手笑且道笑箇什麼良久云毗婆尸佛早留心直至如今不得妙舉雲門示衆云三乘十二分教達磨西來放過即不可若不放過不消一喝雪竇舉了一喝復云好喝大衆若要鼻孔遼天辨取這一喝師拈云唱高和寡則不無二古德檢點將來當甚𡱰沸聲上堂舉靈雲見桃花悟道頌三十年來尋劒客著語云癡狂外邊走幾回葉落又抽枝曾經霜雪苦自從一見桃花後喚鐘作甕直至如今更不疑狐狸探水設有無師自悟底不堪與南禪洗腳只如玄沙云諦當甚諦當敢保老兄未徹在又作麼生良久云曾為浪子偏憐客為愛貪杯惜醉人三月三大聖生日上堂舉泗州大聖國師昔日有問云住在何國答曰何國著語云板齒如鐵橛又問云何姓答曰姓何舌頭拄上腭拈云東涌西沒七縱八橫則不無大聖其奈醜惡俱露茲遇誕辰拈拄杖云拄杖子未免應時應節下箇注腳卓一下云遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦擲拄杖徑山佛智偃溪和尚至上堂東㵎水清且泚源遠流長波騰鼎沸從這裏入不知其幾是則是只如國一禪師經過梁溪驀將泗州大聖鼻孔一揑直得無處出氣為復壓良為賤為復神通游戲良久云君子可八淨慈斷橋至上堂舉阿難問迦葉云世尊傳金襴外別傳何物公案師頌云弟應兄呼自揚家醜倒却剎竿全機漏逗雖有西湖月如晝何似南禪鐵苕天童智別山至上堂舉芙蓉訪實性大師上堂以右手拈拄杖安向左邊云若不是芙蓉師兄大難委悉便下座師拈云實性用處雖則左之右之其奈翻成特地南禪亦欲效古之作未免拔貧作富蒿湯備禮擲下拄杖云若不是天童師兄大難委悉便下座結制小參金烏急玉兔速百歲光陰一瞬息驀拈拄杖云惟有拄杖子硬葛狚黑𥻘皴勿變遷無面目三月護生九旬禁足酌然使得十二時不被十二時催促任他門外紅塵擾擾來往憧憧肥馬碌碌瘦馬碌碌驀然翻變化為龍為雨為霖俱莫測卓一下復舉僧問智門蓮花未出水時如何答云蓮花出水後如何答云荷葉師拈云應機接物則不無智門要且只能順水張帆不解逆風把柂有問南禪蓮花未出水時如何答云三平二滿出水後如何答云四角六張結制上堂衲僧家擔兜行腳那邊經冬這裏過夏撑眉努目口嘮舌沸及乎與之立箇期限同住大光明藏禁足護生一似蛇入竹筒伎倆俱盡山僧不免撥開些子活路總教轉得身吐得氣見山是山見水是水飢來喫飯困來睡祈雨開經佛事毗盧遮那佛願力周法界一切國土中恆轉無上輪所謂一句之內包法界之無邊一毫之中置剎土而非隘塵塵爾剎剎爾巍巍乎蕩蕩乎靄慈雲而誘大千霏法雨而津百億遂得五穀秀實萬物滋生處處通津頭頭合轍任麼委悉如是我聞開信受奉行卷不滯言詮脫或未然切忌巡行數墨淹黑豆子是則是只如端明相公與衆官等為民祈請閲此大經臨筵作證必竟有何祥瑞乃云願展調羮活國手為霖為雨沃人間上堂舉無著和尚往五臺路逢一老人無著問云莫是文殊麼老人云豈有二文殊無著便禮拜老人忽然不見趙州代云文殊文殊薦福懷云無著只有先鋒且無殿後老人若不隱去有甚面目見無著師拈云二古德總是隨邪逐惡無著認假不認真待他道豈有二文殊便與兜一喝老人縱有神通亦使隱身無路諸人只今要見文殊麼擲下拄杖云直下來也急著眼看元宵上堂召大衆云祖佛付授以心傳心猶如鏡燈交光互照燈喻一真心鏡喻十法界燈燈相攝鏡鏡交羅盡十方佛剎微塵數世界重重無盡無盡重重炳煥融通靈明廓徹所以道重重交映若帝網之垂珠念念圓融類夕夢之經世然雖如是諸人夜半法堂上東行西行切須照顧且道照顧箇什麼良久云照顧撞著露柱退院上堂梁渚溪邊下直鈎波翻浪輥費牽抽六年用盡腕頭力收卷絲綸恁性遊不著此岸不著彼岸不滯中流欵乃一聲天地秋師因日域法眷道舊鄉人不忘徑山道聚之義屢邀間樂纍却復至於景定庚申暫與一遊海船檣上龍獻七大寶珠舉衆瞻仰咸云東海龍王來迎繼即須帆速達彼岸聖福禪寺住持乃法眷適值開山千光法師忌辰方丈大衆禮請升座問答不録乃云毗盧性海本無大小方圓妙淨明心不礙色空明暗如鏡含萬象似月印千江曾無出沒之蹤奚分彼此之間所以居宋朝則口吞三世佛遊日本則喜動萬家春處處通方頭頭合轍適值聖福法兄雲集此方他土若聖若凡宴坐圓覺妙場為說摩訶般若前半夏說前分般若後半夏說後分般若前後頓說常說熾然說無間歇只要諸人頓證頓悟一夏無虗棄底道理茲值開山和尚千光法師遠諱之辰俾令為衆闡揚且道說箇什麼以拂子擊禪床一下云這裏見得徹去釋迦彌勒飲氣吞聲臨濟德山望空啓告雖然不是任公子徒勞話釣竿復舉南泉和尚示衆云王老師自小牧一頭水牯牛擬向溪東牧未免食他國王水草擬向溪西牧未免食他國王水草不如隨分納些些總不見得師拈云南泉老漢雖則不忘水草之恩其奈腳跟未點地在兀庵盡力勃跳也出他綣繢不得雖則這邊那邊應用不缺其奈先被聖福法兄勘破然雖如是且作麼生是納些些底道理以拂子擊禪床一下云眼睛才定動未免那斯祈師次至京東福禪寺方丈大衆禮請升座問答不録提綱欲識佛性義當觀時節因緣時節既至其理自彰是故靈山密付之後少室單傳以來諸祖㸦興分宗列派繩繩有準的的無私續焰聯芳直至今日堂頭法兄不忘徑山師席義聚屢承之約正為提持窳惰暫導來誡越漠觀國之光即回舊隱畢殘既乍到此俾令為衆舉揚只得客聽主裁遂即大唐國裏打鼓日本國裏升堂宗通說通無固無必人天畢集凡聖交參宛爾一會靈山儼然未散普使未信者信未聞者聞人人獨步大方箇箇歸家穩坐是以謂之佛性義時節因緣時節既至其理自彰雖然如是惟有向上一路未敢動著何故相逢且說三分話未可全拋一片心師關東部從遠迓才到建長禪寺掌國最明寺殿懷香先來參禮力勸端坐受炷拜了復進前覆云弟子在大宋曾禮拜和尚今者多幸再拜慈顏見其語異師即握起拳云吾雖年老拳頭硬在復進前云弟子兩年前曾夢見和尚頂相教訓參禪惺後親繪供養此者獲拜慈相與夢見一同喜悅之至師云且莫說夢又問和尚尊年多少師云六十三云弟子不問這箇年師仍竪拳云莫是這箇年麼擬議無語師便𡎺三拳欣然領話云蒙和尚教打歡喜無量師云不得作拳頭會方就坐少欵而辭次朝復至同方丈大衆禮請即就寺為衆普說據坐垂釣年來佛法播關東兩國喧傳觸處通僕僕來觀殊勝處果然殊勝妙難窮莫有共相贊揚者麼禪客出問云收綸罷釣入扶桑大海應難可測量道眼從來空宇宙灼然遍界不曾藏學人上來願聞法要師云四海浪平龍睡穩九天雲靜鶴飛高進云恁麼則非但建長增秀氣少林花木又重新師云有水皆含月無山不帶雲進云記得昔日臨濟得黃檗印證之後往遊徑山彼時徑山七百餘衆因甚星飛火亂師云不會做客勞煩主人進云可謂真不掩僞曲不藏直師云錯下名言進云堂頭和尚為五山龍象之首作巨剎人天之師駕海而來闔國欣幸師云不因紫陌花開早爭得黃鶯下柳條進云恁麼則天高群象正海闊百川朝師云天下人仰望不及進云臨濟上徑山七百餘衆星飛火亂和尚遊日本六十餘郡仰德瞻風且道與臨濟是同是別師云龍得水時添意氣虎逢山色長威獰進云今古應無墜分明在目前師云猶隔重關進云今日方丈大衆奉上命禮請為衆普說和尚必竟如何指示師云更吃老僧拳頭始得進云恁麼則棒頭有眼明如日要識真金火裏看師云得饒人處且饒人又一僧問云德山入門便棒時如何師云匙挑不上笑殺傍觀進云臨濟入門便喝時如何師云翻成忉怛進云一人行棒一人行喝那箇親那箇疏師云一時列下進云堂頭大和尚光臨此土必竟行棒耶行喝耶師云總不作野狐精見解進云如何是為人底一句師云三十棒且待別時乃云鎌倉路滑到者還稀巨福山高誰能到頂千聖應難入作萬靈景仰無門若非切切相邀拙者安能到此便見大力量人大智慧者同一悲願同一慈力創新寶所金碧奐然樓閣重重像法濟濟令一切人覩像法而悟心法了自心而見佛心於一心而頓證百千法門於一法而貫通無量妙義以至布慢天網開萬煅爐煅聖煅凡烹佛烹祖掀翻海嶽撥亂乾坤拽取占波與新羅鬪額是則是只如今日主實互換凡聖交參賓主歷然合談何事驀拈拄杖云兩箇䭾子相逢著世上元來無直人卓一下復云目前無法意在目前不是目前法非耳目之所到是故三教聖人互相出興各立門庭示真實相無非只要天下人遷善遠惡明心見性雖然殊途究竟同歸一理惟是證悟有淺深用處有廣略如水銀落地大者大圓小者小圓如明鏡當臺胡來胡現漢來漢現且老拙生緣西蜀幼年棄儒祝髮挾𠕋講肆數載知非究竟捨去南詢遍歷諸老門庭及到蔣山八月二十五值癡絶和尚上堂舉覆船有僧到雪峰峰云甚處來僧云覆船雪峰云生死海未度為甚覆船渠無生死言下忽然認得本來面目憤憤之心稍息及到育王參無準和尚遇上堂舉僧問古德深山巖崖還有佛法也無古德云有如何是深山巖崖佛法答云石頭大底大小底小言下如夢忽覺自後凡遇入室常下語及侍師上徑山一日聞師云昔日白雲端和尚因東山演祖參請次與之云近有數僧自廬山來教伊說禪亦說得下語亦下得批判古今亦批判得祖云和尚如何端云我向伊道直是未在演祖聞此語數日飲食無味後七日方諭厥旨是時拙者一聞舉此無言可對只向未在處做工夫久久不輟凡入室也不下語一日遇入室先師把住云尋常口嘮舌沸如何不下語打一竹篦當下打破漆桶禮拜了退然後徐徐陳於師前乃云汝徹也只是得道易守道雖須要默默守之久久自然感驗也自此如癡如兀度日先師遺以兀庵二大字只欲隨緣放曠以度殘喘無奈數處被抑首衆業緣所牽公選屢董小剎不容辭避在衆時曾同蘭溪聚首於蔣山徑山千百衆中雖各究明己躬大事時復以此道切瑳琢磨執別而來各天一涯伏聞航海東來際遇王公大人信向佛法留心此道不忘悲願同心同力創新寶所日域魁為第一甲剎與宋朝第一徑山無有異矣數年前屢承之約纍却復至以故撤去寺事越漠乍到乃荷遠迓之禮伏承謙冲領大衆奉上命請為衆普說不容堅辭普說二字何敢承當前輩尊宿圓悟大慧諸宿德辨瀉懸河滔滔無間具載方𠕋看者無不明心見性安敢望古德萬分之一雖然久參之士故不在言後學初機亦須親見親聞以故勉從所請應箇時節略聞此間從古以來惟弘教法於今始創宗門往往信與疑而未決者衆殊不知不立文字直指人心見性成佛之旨從上無數大劫千佛萬佛互相出世惟傳此心非特迦文老漢出世強立此旨且如初生下來一手指天一手指地云天上天下唯我獨尊但不知此語出何教典此便是不立文字直指人心底張本以至棄金輪王寶位直入雪山六年修道於臘月八夜覩見明星忽然頓悟乃云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得此是不立文字直指人心底樣子但不知教相中以為教解釋耶以為禪解釋耶自成道之後於三七中思惟如是事無啓口處蓋為下根中根上根啓問不得已起道樹詣鹿苑觀根逗教應機而說下根者為說小乘法四諦法門等是中根者為說中乘法十二因緣等是上根者為說大乘法六波羅蜜等是初談有教阿含等經是為一切衆生皆著有見次演空宗般若等經是一切衆生復著空見著有著空執病轉深後向靈山始開中道非有非空中道大乘之教圓覺楞嚴華嚴等經是說來說去三百餘會漸積之多滿龍宮盈海藏凡一切經中皆說不立文字直指人心之理曉然無纖毫差殊如何見得如金剛經首先須菩提白佛言世尊如來善護念諸菩薩善付囑諸菩薩乃至云何應住云何降伏其心世尊更不周由者也只就他身子上打劫答云須菩提若善男子善女人發阿耨多羅三藐三菩提心者應如是住如是降伏其心須菩提當下妥首貼耳便道唯然世尊只不合道箇願樂欲聞引得許多葛藤遍地此是諸經中說不立文字直指人心底影子此之經語只指為教相文字之說得麼末後又道云何為人演說不取於相如如不動雖有疏鈔解釋到此亦未免口似磉磐南泉和尚猶放不過便道喚作如如早是變了也衲僧門下無縫罅處拶開縫罅得人憎無出這些子所以瞿曇老漢洞見後來必有泥教者乃云始從鹿野苑終至跋提河於是二中間未嘗說一字雖則盡力剗除執泥教相之病其奈執病轉深此處合徹見不立文字直指人心之要後於靈山百萬衆前拈一枝花獨有迦葉領於一笑之頃便見拂跡成痕不合更使冬瓜印吾有正法眼藏涅槃妙心分付摩訶大迦葉𡏖圾堆上重添𡏖圾當時百萬衆中忽有箇漢翻轉面皮便見一場敗缺不少瞿曇入滅之後迦葉阿難諸大弟子結集從前四十九年所說之法列為三乘十二分教豈特只滿龍宮盈海藏耶其有無著天親護法馬鳴等諸菩薩深慮小根小智者難曉佛理於是各各造論解釋號為經律論三藏漸漸傳來唐土終未能足由是玄奘諸師親往西天請經律論歸來東土乃見一切人實難曉解遂製疏造鈔解釋令一切人容易曉解積來積去堆積如山自此之後習經律論疏鈔者執為文字之學以為究竟之學不信教外別傳之旨是為究竟之道深可憐憫但不知執泥文字者除却黑墨白紙之外如何趣向往往金口玉舌亦難與分說逗到臘月三十日生死到來前路茫茫未知何往方知文字之學果不得力悔將何及迦葉阿難等結集法藏之後更不復著眼只將靈山密付不立文字直指人心之要祖祖相傳是故阿難問迦葉云師兄世尊傳金襴外別傳何物迦葉呼云阿難阿難應諾迦葉云倒却門前剎竿著這箇即是前來所得底冬瓜印子𮞏相傳授至二十八祖菩提達磨祖師得法破六宗之後受讖記十萬里航海而來遊梁歷魏惟以不立文字直指人心之要少林九年面壁得神光求道于前其神光者乃所學儒教諸子百家貫古通今無不曉了所習三乘十二分教無不精通問法達磨祖師云諸佛無上妙道可得聞乎達磨祖師答云諸佛無上妙道豈小根小智下劣之者所得哉於是神光斷臂于前立雪齊腰祖師問云當以何求神光云我心未寧乞師安心祖師答云將心來與汝安神光推窮儒教諸子百家三乘十二分教中並無一句相應只據實祗對云內外覓心了不可得如趂狗逼墻計窮力盡祖師只輕輕以冬瓜印子面門上一搭云與汝安心竟且道與世尊答須菩提應如是住如是降伏其心之旨何異何別試著眼看神光得此印可據師繩為二祖繼得三祖乃是白衣居士儒釋之教無不精通忽患風恙特來問法於二祖云弟子身纏風恙乞師懺罪二祖更不移易一絲毫子便云將罪來與汝懺三祖亦如是推窮無計乃云內外覓罪了不可得二祖仍將所得底印子一塔云與汝懺罪竟佛佛授手祖祖相傳直至今日所以靈山拈花一節謂之教外別行既是經律論皆包括在中更不單單具載是知我此宗門猶如大海百川異流莫不同歸一味如太虗空盡百億恆河沙世界無不包容所以道未有世界早有此性世界壞時此性不壞諸佛未出世祖師未西來人人常光現前箇箇壁立千仞在聖不增一絲毫在凡不減一絲毫惟是迷悟有殊所以聖凡有異遂致執泥文字之學滋多本有之性不能發現背覺合塵弃本逐末蓋由是矣儒教亦云君子務本本立而道生此本即是自己本命元辰本來面目得此本立方可得道生本若不立何緣得道生此是儒家膚淺之教尚且說得如此親切何況不傳之妙者耶是汝諸人若要真箇參禪學道究明生死大事以徹證為期者第一須具堅久身心先將平昔所學諸子百家文章四六所習經律論文字之學與夫見聞覺知惡知惡覺一切雜毒揚在他方世界然後退步就己放教空勞勞地只將古人一轉語貼在鼻尖子上晝三夜三行住坐臥折旋俯仰孜孜切切抵死𢬵生與之廝崖無纖毫間斷不見道暫時不在如同死人提撕來提撕去日久歲深因緣純熟忽然啐地折嚗地斷大死一回己眼豁開本地風光頓現在前方知道元來只在自己不在別人直下不疑佛不疑祖不疑天下老和尚舌頭所以道參禪須是悟悟了須遇人若不求明眼宗師印證譬如讀書發解及第了不得轉官相似亦只徒然既得柄霸入手便知生從何來死從何去生死去來絲毫無疑到任麼田地方謂之大休大歇無生死可怖無菩提可求盡十方世界通上徹下是箇真實人體豈不見古德道若有一人發真歸源十方虗空悉皆消殞信不誣矣然後道香果熟入纏垂手隨機接物自然綽綽有餘裕哉若是半信半疑今日問一句明日問一句更歇數日又看𠕋子中記得兩句又問如何若何央央庠庠更有一等薄福闡提專要點檢別人並不點檢自己決不堪為種草散保此等之人參到驢年也未夢見在豈不見良遂座主講得極是淵源乃知教相文字之學非是究竟聞麻谷和尚門墻孤峻弃去文字之學特去參扣麻谷一見便知是箇漢便去菜園裏善知識者是大因緣且不與你周由者也如何若何只要箇人向無入作處入作及至第二次見麻谷直入方丈閉却門良遂忽然大悟直從死邊過便供出死欵云和尚莫瞞良遂良遂若不來見和尚幾乎被十二本經論賺過一生從前執泥經論文字之學執病當下冰消瓦解及歸講肆中謂衆曰諸人知處良遂總知良遂知處諸人不知若不回光返照安有此耶所以宗門不問僧之與俗貴之與賤皆可趣向所以從前大儒李翱相公裴相國東坡內翰韓文公張無盡楊無為等諸大朝貴自小讀書發解及第做官到極則處了儒教故是貫古通今飛英騰茂釋教道教無不精通亦知非是究竟急急回頭轉腦參見知識往往聰明靈利半信半疑者難得入手其聰明靈利底除是不向前若奮鐵石身心極容易契證豈不見于頔相公參見紫玉藥山諸老宿他尋常儒釋之教無不遍看只將所疑之句以發問端一日忽問云如何是黑風吹其船舫飄墮羅剎鬼國古德便與直提向上頂門痛與一槌答云于頔客作漢道什麼于頔相公滿面怒色古德指云這箇便是黑風吹其船舫飄墮羅剎鬼國于頔言下忽然契悟須信佛法無人情除是大根器人方禁得這箇惡辣手段與央央庠庠半信半疑者何啻天地懸殊所以古德道參禪參到無參處參到無參始徹頭又有老宿云參禪參到無參處參到無參未徹頭一似水上捺葫蘆子相似如何摸索必竟如何一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流復舉蔣山贊元禪師因荊公舒王問云如何是佛法大意蔣山不答舒王扣之既久不得已而謂之曰公受氣剛大世緣深厚以剛大之氣必能身任天下之重然用捨不能必心之未平以未平之心安能一念萬年哉師拈云大小大贊元禪師雖則著草鞋向舒王肚裏走千百匝殊不知剛大之氣即是此道之大本佛法之根源本欲當面瞞人那知翻成自瞞矣當時舒王若裂轉面皮甚處討蔣山然雖如是要見舒王則易見蔣山則難且道誵訛在什麼處諸人還委悉麼以拂子擊禪床一下云伯牙與子期不是間相識便下座
