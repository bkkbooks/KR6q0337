front:
  text: 師範和南手白靈巖堂頭長老別去許久中間受信後莫知動止歲暮忽於蘇城舟中收書并信且知出世出自諸山公舉甚慰老懷既曰住持却與間衲子不同便有住持之職從上來大有軌則當一一依而行之緊要者惟以本分事廣攝來學亦宜隨己力量施設當去過與不及之患久久自然感驗也貴老久立叢林備見今時之弊可默省察莫令失腳墮其輩流為識者笑吾老矣一住五峰今十七年矣開奏後漸理求間計只有早晚矣法衣乙頂付去遇上堂可一披幻質無現成者付在別日旅中草略奉答不甚子細餘宜為宗乘自愛不一一師範和南手白靈巖堂頭長老兀菴和尚語録目次卷上師範手白慶元府象山靈巖廣福禪院語録常州無錫南禪福聖禪寺語録卷中巨福山建長興國禪寺語録婺州雲黃山寶林禪寺語録卷下法語序跋佛祖贊自讚偈頌小佛事跋
