body:
  text: 法語示關東法孫關東掌國法孫誠至信向佛法只欲發明己躬一大事懷香袖紙拜求法語并袈裟為究道之助勉為引筆云信為道源功德母長養一切諸善根所以諸佛法者皆從信心之所生但信心堅固則善心堅固若善心堅固則道心堅固若道心堅固則佛心堅固與天地同根萬物同體利人利物亘古亘今無一毫之差別者也信心者信向佛法僧三寶敬信天地人神孝養父母師長一切事皆能敬信無有退失信能必到如來地者也信向心如是便能持五戒修十善若持五戒堅固善根不斷必生人道若修十善堅固必生天道若生生信心堅固善根不斷者即是三資糧四加行位菩薩十住位十行位十回向位暖頂忍世第一位是也自此從凡入聖十地位菩薩乃至金剛心後解脫道初方且漸次入等覺位妙覺位自十地位至此妙覺位謂之如來地說法如雲利生如雨自利利它度未度也如來地者即自己信向堅固之心是也持五戒修十善堅固之心是也但心心堅固位位增修無有退失者即是佛心必到如來地也縱饒修習到此却不要執著直須沒彼前來之位名但彰自己之實行吾亦不知吾是誰與天地同根萬物同體方有少分相應戒律中教相中所說一同若要參透向上一著須是離心意識參出聖凡路學方有趣向分豈不見趙州和尚有僧問云狗子還有佛性也無州答云無自古及今惱亂天下衲僧無有休日法孫但十二時中行住坐臥只向無之一字切切留心念念不捨食息不忘日久歲深忽然參透歷歷分明絲毫無疑自己本來面目本地風光頓現在前便與從上諸佛諸祖所得所證無別此生它生得大自在得大解脫便見從前信心善心佛心自己心它人心天地同根之心萬物同體之心無一毫差別盡大千世界日月星辰山河大地亦無一毫差別於無差別中千差萬別信心亦如是善心亦如是佛心亦如是乃至菩薩心緣覺聲聞之心天地人飛走山河大地之心亦如是心心既如是可以治國治家利人利物盡未來際無有退失作是說者聞是說者誰復誰乎咄從前汗馬無人識只要重論蓋代功示源清藏主靈山密付猶如話月曹溪竪拂猶如指月代相承炎天求雪吾侍徑山圓照老師雖歷多載曾無一法可得唯飢飽寒溫能自知之至於涉世匡徒亦無毫髮差別屢承法眷之約因東望扶桑有大乘根器冒險越漠觀國之光復遭世緣所陷悒悒之氣而不能釋源清藏主贊佐叢社表儀多衆超卓偉偉袖紙需語以為究道之助不容堅却呵凍書此祝之云鼻端若有通天竅可與吾出此氣也示隆覺藏主隆覺藏主久歷叢林留心參學以老僧示衆語中有無之一字於四威儀中提撕不輟昨五月八日夜四更四點就床之時豁然頓息自嘆曰菩提妙果不難成真善知識實難遇也信腳上床信手整服更無別念身心如如無彼此之非如如復如如專一守之諸緣自空唯自己耳雖然如是不知正邪如何伏乞慈悲開示老僧覽之是說欣然有喜元來殘羮餿飯亦有人留心矣既認得些子蹊徑方可入道所謂見道方修道不見復何修但專一守之如執杖牧牛勿令放逸莫管相應不相應正邪不正邪出此沒彼盡未來際不動不變始是工夫純熟始是得力處亦不得打淨潔毬子更須知南泉道喚作如如早是變了也須和這無之一字如如復如如勝妙境界一時揚却始得豈不見道法身有三種病二種光一一透得始解穩坐更須知有向上一竅在此語大有賺人處若檢點得出却再來老僧手裏請棒喫示松島圓海長老佛法遍在一切處一切衆生及國土豈有東土西天宋朝日本分疆列界者耶所以百億四天下佛法始自靈山之所傳靈山之佛法乃自七佛之所傳七佛之佛法乃自賢劫千佛之所傳賢劫千佛之佛法乃自過去莊嚴劫之所傳過去莊嚴劫佛法乃自未有世界未有佛祖威音王已前之所傳其所傳者本無法可傳但以心傳心如水傳器無傳之傳所以流傳至今絲毫不增絲毫不減若有有傳之傳便成斷常之法終成敗壞無有今日之盛者也我於然燈佛所實無一法可得誠哉是言所以參禪只圖見性如觀掌上若不見性無異盲人摸象有何益哉我宗無語句亦無一法與人若有一法與人便成斷常之法非正法也從上佛佛授手祖祖相傳只貴所得所證正知正見廓然蕩豁徹見本源方謂之正知正見繩繩有準法法融通或於十二分教明得者或於教外明得者或有未舉先知未言先領者或有無師自悟者蓋根性優劣不等只要明自心見自性宗眼明教眼明如杲日當空百億四天下無幽不燭何曾有絲毫隔礙來若是所得所證半明半滅何緣得徹見本源既不徹見本源終成斷常之法非正法也𢬵得死工夫方學得生活計工夫不到何得周圓參須實參悟須實悟棒打石人頭嚗嚗論實事既得實證實悟處與從上諸佛諸祖無異無別至於隨機應變揑聚放開自然得大自在如雷如霆有何隔礙來以至出死入生出此沒彼有何隔礙來松島圓海長老曩遊宋朝復回舊贊佐法社近董禪剎既曰住持便有主法之稱為後學之規模須要明吾宗之來源開人天之正眼方且不枉匡徒之職矣袖紙需語信筆不覺忉怛示成道大師成道大師見任住持肥後州報恩寺已經數載內外享合緇白歸向切為自己一段大事因緣𮌎次礙膺之物未釋往年雖曾求師指迷蓋緣歲月蹉跎未有與決思之世間名利之役無有休歇於自己全無所益由是暫假不遠數千里之遙僕僕來參只要決此一事了了分明免致虗生浪死之苦不辜負出家之志只求直截數句繁多難記矣老僧每見尋言逐句求玄求妙者痛掃之不欲特地不見道我宗無語句亦無一法與人若只求數句亦是繁了若有一句到汝即埋沒汝也若無一句到汝即辜負老僧有句無句一時截斷昔日寂壽道人參昭覺圓悟禪師指示不是心不是佛不是物提撕既久忽然契悟凡有問答如流無滯直往淮西參五祖演和尚乃圓悟法嗣師也才參禮了五祖問云汝參什麼人來寂壽云參昭覺和尚來祖遂問云釋迦彌勒是他奴他是阿誰寂壽拊掌大笑云大小大五祖老翁元來不識他在五祖便知是了徹底人遂與印可自此七縱八橫得大自在佛之與祖到他面前不滿一笑更有何生死礙慮掛𮌎中耶成道大師但將此不是心不是佛不是物十二時中行住坐臥喜怒憂樂片時不要放捨久久便見倒斷非但超他總持末山劉鐵磨寂壽輩一頭地亦乃翻笑建長老翁恣將陳年橘皮以之為火鼓弄人家男女敗缺不少法位大師既是手足不必別紙示正傳長老禪師號宏覺嗣法小師慧安長老號東巖建長聚首孜孜究道請益不輟別後聞之開法住持大興宗社甚慰老懷顓書遠投懇求法語用侍者捧呈云節次請益伏蒙開示因緣欲乞親染而寶之答云今為老懶猒煩却之重復啓請信筆以贈云語底默底不是非語非默更非透出重重關捩而況猶涉厘微豈不見靈山拈起迦葉攢眉得便宜是落便宜不是苦心人不知所以每遇問答酬倡如空谷答響豈容饞哉達磨不來震旦老僧不遊日本單傳直付東巖廣為人天宣演咦輸機是算人之本復指侍者云我宗無語句說甚間公案擲筆噓一聲侍者破顏微笑復云老僧今日失利示院豪長老弘持佛法在人不在法人能弘道非道弘人是也既曰住持却與間衲子不同須當潔己精專為後學者法應機接物亦須隨己力量切防過與不及從上來大有規則當一一依而行之乃善長老經歷多年必能熏煉不失若是未能徹證大法亦須退步就己窮究教徹方是千了百當若只記持言句蘊在𮌎中以為我能我解最是障道之本大法無由發明終不濟事且如住院一事終日役役無有了期但按其綱紀大槩碎事撥向一邊忙裏偷間直將僧問雲門和尚云不起一念還有過也無答云須彌山但將此一轉語時時提撕十二時中絲毫勿令退失日就月將噁地一聲便能徹見本有之性本來面目虗而靈空而妙超然獨脫與從上佛祖把手共行出生入死得大自在豈不偉歟世良田當代住持院豪長老昨冬老僧乍到建長先辱遠訪越春袖紙來語以為究道之助信筆姑塞其誠矣示小師景用徒弟景用侍者執侍既久奉養勤渠始終守節併去雜交顓切向道炷拜求一語懷抱決了己躬一大事即答云我宗無語句亦無一法與人參禪只圖見性若得見性方是千了百當從上無數大劫而來諸佛諸祖千聖萬聖亦只明自心見自性傳此法此法者無傳之傳是為真傳名正法也若有傳之傳是為妄傳非正法也但每日苦樂逆順逐旋消遣惟要參究自己工夫片時不輟久久必獲感驗也驀然明自心見自性盡乾坤大地總是自己全體作用更有何疑慮者哉今為老病力怯不及書而却之侍者忽問云昔日馬大師不安院主進前徐徐問云和尚近日尊位如何馬祖答云日面佛月面佛時如何老僧答云和贓捉敗即頌示之曰日面佛月面佛賊被賊捉見贓物贓賊一時推勘圓漢州姜與邠州鐵復頌曰日面佛月面佛病勢元因自執著只消三片漢州姜煎取一服應驗藥呵呵即書以遺序跋性空序撥草瞻風只圖見性果能見性十方虗空悉皆消殞山河大地依而建立八解六通由茲發現豈不見碧眼胡云不立文字直指人心見性成佛無端粘牙帶齒衲僧門下猶隔重關義侍者號性空求敘語因詰之云既曰性空是中還著得元字腳否義默而不答復指之云錯姑與引筆跋敬侍者頌軸妙喜老漢初發足游方時先以四句偈辭之受業其後句云且喜今朝離火坑前輩標格打頭便有吞佛吞祖底氣槩若不是川巴子如何羅籠得住自後花木瓜種族罕有出乎其類拔乎其萃者焉敬侍者鄉談一同九華豐林受經仙骨亦能越格初發足時府僉祕書贈以伽陀嘉尚其鋭志及到龍游雙徑群英次其韻而美之一家才有事引得百家忙需一語於其後即就其韻一字酬之云休跋奕東峴住常州橫林淨慈賀頌軸㵎東一脉曲曲彎彎分枝列派接於奉川正出東峴滔滔聒聒注入梁溪浪打濤翻蝦蟹魚龍游泳自若引得西湖群英揚清激濁風波遍地余見其源源不已姑以坯土塞之跋大火中燒金剛經不壞最明寺殿信心堅固如金中之剛親染金字金剛般若經直得入水不能溺入火不能燒只以此見堅固之心盡未來際等金剛而不壞者也因觀火中之經合掌頂戴嘆未曾有故書其後云跋了侍者頌軸禪了侍者遊歷宋朝遍參諸老湖海同流寂巖號之揄揚之德頌成巨軸并歸帆之帙併捧呈蓋老眼朧略觀倣佛其中有一句子直是無巴鼻由是急卷而復還之跋大衆賀最明寺殿悟道頌軸靈山密付只要密傳剗地不密惡聲流布相鈍置浩浩至今昨來密室付授最明寺殿只要密傳剗地不密言下忽然打失鼻孔被人指證案沓如牛腰且道因誰致得咄來說是非者便是是非人跋安忍子大智律師草書心經竺皇先生四處十六會慈悲之故有落草之談掬其旨歸八十餘科不出乎一紙靈芝老子守南山家法外筆陳掃雲煙無故隨後草窠裏輥雖則貫古通今正眼看來草氣太甚佛祖贊出山相入山出山何異何別六年所成一時漏泄那堪滿口嚼冰雪渡江達磨道箇不識自生荊棘悽悽渡江忍羞面壁賴有神光與雪屈寒山拾得指東畫西眼笑眉垂心似秋月髮如亂絲吟句不成句題詩不是詩豐干輕饒舌敗缺一時知善哉苦哉敢稱七佛之師行道持數珠觀音從聞思修入三摩地八萬行門一十九類尋聲救苦越塵沙一串數珠數不已布袋杖頭挑百億乾坤布袋貯三千世界閙市叢中等箇人不知誰是知音者咄普化踢倒飯床特地乖張指空話空撤顛撤狂木槵拈來換人眼贏得惡聲滿大唐魚婦觀音提起活鱍鱍馬郎亦被惑度生雖願重那知成敗缺靈照女拈將破笊篱風前賣與誰攙行奪市處非獨老爺知無準和尚頂相文武火煨殺人千衲子恨難伸五處主法雙徑兩新內庭敷演賜號超倫自創正續梵菀延納雲水高賓將謂多少奇特依前滿面埃塵咦義簡禪人𦘕圓相請贊圓同太虗無缺無餘良由取捨所以不如恁麼說話早是起模𦘕樣了殊不知才擬任麼便不任麼更問如何若何笑倒嵩山破竈墮最明寺殿真像掌持國土天下安堵信向佛法運心堅固德重丘山名播寰宇清白傳家望隆今古參透吾宗眼眉卓竪末後一機超佛越祖咦汝辜負吾吾辜負汝自讚正傳寺住持安東巖請贊生緣於西蜀非獨遊日本十方國土中當頭俱坐斷宏海侍者請贊這川藞苴全不仁者握起老拳佛祖也怕小師景用請贊要贊而無德可贊要罵而無過可罵贊與罵不及處大地而不能載正因法孫命工繪吾幻質炷禮請讚箇樣面觜阿誰敢擬威凜凜生氣憤憤地臨濟德山望風敬畏㘞和蘇嚕之偈頌無錫劉相幹佑篤信佛法常來參請自和雪竇罌粟頌來呈老僧即次韻酬之云一實包含萬點春收來粒粒是家珍些兒圓轉誰能委唯一身分百億身公讀了忽然契悟衆皆賀喜乃知信向佛法靈驗如之鐵壁剛然隔斷太虗空縫罅渾無拶不通頑鈍碓夫不破倩人書處轉乖宗鐵牛骨格純剛蹄角全軒然鼻孔自遼天不貪陝府欄邊草肯遍耕翻祖父田海月金波涌出爛銀盆黑白虧盈湛不痕莫謂清波無透路珊瑚枝上影團團竹溪空服高心耐歲寒滔滔聲價沒遮攔自從南北分枝派攪動江西十八灘雪竇前堂音座寮有煉指行人求頌未徹根源肯便休煉磨三種愈精修發輝自己光明藏抹過俱胝一指頭寫華嚴經求頌破一微塵出此經因該果海果該因無端却被管城子名句文俱錯指陳𦘕髑髏檐人我檐者求頌自從塵劫至于今執著無明人我心驀忽眼睛俱突出乾坤大地孰知音栽松道者栽培得地節操蒼然死而復活身後身前楖𣗖橫肩阿剌剌再來不直半分錢亮知客出世住戒香主中賓句驗來端四海禪流總被瞞鐵磨機輪難比擬逢人即出舌翻瀾南洲贍部那邊沙際間閧然魔子恣縱橫周金剛帶不平氣勘破却從潭上行小佛事尤木石相公薨背上香此一炷香根蒂穩實枝葉繁榮透骨馨香遼天價重爇向寶爐以伸供養共惟宋故侍讀提史端明相公清白傳家儒釋通貫詞源浩汗而涌三峽水講讀琮琤而對九重天修史決古今是非操麻定人我邪正為紀為綱兮霜風凜凜利人利物兮春日融融因觀妙喜語句脫然契證如如披閲內典真乘驀忽點頭唯唯總道坡仙之再世宛然普覺之後身來兮似月行空去兮如雲散壑南禪每叨藥誨懷抱奚忘荐伸奠禮之芹領徒熏誦神靈歆格不昧本來插香云願此香雲遍剎塵饒益一切成正覺奠茶錫麓之英上苑之春山川秀發雨露重新石銚烹來味別快哉壯爽精神睡魔退舍兩腋風清翻笑趙州錯喚人奠湯地道收來精粗揀擇牛溲馬勃藍毒砒霜盡情細末將來變作醍醐上味當陽點出滿座馨香不比其他薑杏湯潮西堂鎖龕靈峰全提正令太白平分風月碎佛祖玄關掃衲僧窠窟活中全死死中全活舉鎖子云何似白雲鎖口訣覺禪客起龕奮不顧身丁字著腳拶透玄關死生夢覺便任麼去時如何切忌語脉裏轉却明侍者起龕明明知有道不得明明道得不知有一回喪盡目前機八角磨盤空裏走嵩知客下火福州人飛猿嶺太白嶺須信平夷中險峻不憚區區親到來等間踏斷無蹊徑泯去來忘途轍六月火燒空烏龜頭帶雪蒙庵主下火浙翁小師在天童死佛心宗賑愚蒙出生死絶羅籠泥牛入海覔無蹤以火把打圓相云扶桑依舊一輪紅普淳二上座起骨普通年後淳祐年初有則公案非實非虗擬之則心膽喪著則眼睛枯中問有優有劣如何判得恰好撫骨一下云一狀領過安危峰藏主起骨中秋後舌底卷風雷胸中蟠錦繡機輪轉碌碌古今都穿透不墮常流骨格渾別獨騎瘦馬踏殘月藏上座入骨與汝往來者是藏死語誑人成自誑不往來者亦是藏火亂灰飛收不上收得上與誰論夜聽巖溜響朝看嶺雲屯清圻二上座入塔二由一有一亦莫守抹過空劫前超出涅槃後攪不濁澄不清沒圻岸等空平酌然雙暗復雙明休認山河作眼睛端知客秉炬驗衲僧句如何舉似要知端的言外領取驀然當下死偷心鐵鑽通紅被蟲蛀小師景用命工鋟板越州兵衛主將官二月初一日夜忽夢見一大寺殿堂深廣樓閣重重莊嚴真奇特裏面去不得外有一人立兵衛主將問曰這裏名什麼所人答曰此間名巨福山建長禪寺善法堂彼岸之時十方諸佛來這裏說法度人中間第一尊便是巨福山長老如今便是彼岸也裏面無人去得你且待長老出來看少時便得見長老出來年及六十餘歲身相圓滿不短不長兵衛見了心中如法歡喜夢覺後語屋裏人曰我夢見如此事你等曾見巨福山長老麼屋裏人答曰未曾見兵衛云我自去巨福山參見長老即自來建長寺侍者寮說如上夢事了便得見兀庵和尚在佛殿領衆行道諷經果如夢見一同始信夢事真實見者聞者手舞足蹈時景用在侍傍同衆親見是事即略記之寧侍者自育王至雙徑尾相從已經數載見其孜孜為道真本色衲子秋風吹衣忽來告別且袖紙求語而謁蔣山吾不欲特地固却之而所請益堅因謂之曰昔太師祖據鍾阜大慧居五峰一時龍象往來二開士之門憧憧致武於道又不知誤了多少人家男女吾故不敢仰視前輩而癡絶兄實當世宗匠此行若空去後必實回若使實去必須空回斷無疑矣或恐問著此問如何若何却不得妄通消息何故彼此老大端平乙未中秋徑山無準叟書于凌霄閣無準老送寧侍者謁豫且有不得妄通消息之訓教兒迷子之訣自當如是殊不知子未下五峰頂此消息已塞破四天下無你左遮右掩處況無準老有三千里外定殽訛底眼目早已知豫誤了人家男女子歸當自知之矣端平丙申大寒金陵北山道冲書于正傳歐峰有亭曰見山乃昔人啓關悟心之所戊辰嘉定余適會吾燦祖演心銘於其上至兀爾忘緣歸復自然處余不覺掩耳而退三十年來每每兀坐即知其然亦知其所以然終未能見其所以然而然也及觀徑山無準大長老書兀庵二字付寧侍者因問命名之意曰無他焉唯癡兀自守也若果如此曷若從徑山所書兀為菴兀兀然而從燦祖遊為愈也心月書這暗號子不是當場主將他人一字不會而今大唐國裡棊布星羅如吾兀菴叢林傑出正續真傳言句流布活人眼目余獲覽觀痛快平生故書其後云寶祐六年季夏望日晉陵尤煜
