body:
  text: 住巨福山建長興國禪寺語錄侍者道昭景用禪了編陞座祝聖據坐垂釣出得油缸入醬缸通身是口若為談老拳尚有些筋力𢬵命來機為指南有麼有麼有僧出問云極目春光水照空岸莎汀草碧茸茸乘時願赴慇懃請大展慈風振祖風學人上來願聞第一義諦師云杲日當空清風帀地進云諸佛出世地涌金蓮和尚榮鎮此山有何祥瑞師云擘開華岳連天秀放出黃河一派清進云非但建長增瑞氣八方鼓舞樂忻忻師云春行萬國月印千江進云大唐國日本國宗風益振無殊別如何是大唐國佛法師云一棒一條痕進云如何是日本國佛法師云一摑一掌血進云任麼則一處通千處萬處一時通師云只你一箇未知痛痒在進云只如大檀那國公殿特加禮請和尚開堂演法和尚數次啟劄力辭復進十五偈控免因甚究竟辭免不得師云早知今日事悔不慎當初進云可謂佛佛道同悲願重廣開利濟沃蒼生師云好事不如無進云茲辰國公殿親臨拱聽法要必竟如何指示師云近水樓臺先得月向陽花木早逢春進云任麼則錦上鋪花千萬重師云這一句子却也相似乃云諸佛未出世祖師未西來人人真智湛然好箇清平世界無端胡種萌孽便見毒惡流行平地干戈無風起浪遂致分疆列界移東補西荊棘參天葛藤遍地然雖如是只如世界未立佛祖未興已前如何通信良久云鯨吞海水盡露出珊瑚枝復舉臨濟和尚因王常侍相訪同到僧堂常侍云這一堂僧還坐禪麼濟云不坐禪常侍云還看經麼濟云不看經侍云也不坐禪也不看經必竟作箇什麼濟云總教伊成佛作祖侍云金屑雖貴落眼成翳濟云將謂是箇俗漢師拈云臨濟老漢氣吞寰宇只要勘破一切人却被王常侍等閑勘破諸人還知麼且聽下箇注脚一挨復一拶一踢復一拳今古應無墜分明在目前當晚小參有僧出問云空手把鋤頭步行騎水牛人從橋上過橋流水不流意旨如何師云金剛杵打鐵山摧進云如何是空手把鋤頭師云千聖難摸索進云如何是步行騎水牛師云著則瞎進云人從橋上過橋流水不流又作麼生師云却較些些子乃云有句無句如藤倚樹樹倒藤枯句歸何所須知言詮不及描貌難成溈山笑裏有刀遂致叢林話覇恁麼恁麼大難大難纔有一絲頭便有百絲頭獅子一滴乳迸散百解驢乳然雖如是添得溈山笑轉新復舉乳源和尚示眾云西來的的意不妨難舉唱時有僧出乳源擘脊便打云如今是什麼時節出頭來便歸方丈師拈云正令不行拗曲作直這僧若知痛痒乳源歸方丈未得在上堂卸却千斤重擔惟要在處清閑老來業債未脫復墮建長一關語音未辨酬酢猶艱說者聽者難復難只據一條白棒南來者北來者俱與痛棒忽然打著一箇半箇獨脫底從教知道酌然不在說處不說處三乘十二分教總是指空話空撒土撒沙必竟如何摘楊花摘楊花佛生日上堂右脇纔生便放拍盲指天指地獨步縱橫雲門要打殺建長助掘坑惡種從教不復萌雖然也是賊過後張弓結制上堂昨日晴今日雨春夏交承時節順序一似林下衲僧不越規矩三月安居克期而取西天以蠟人冰雲峰以鐵彈子建長亦有一條活路飢則飡渴則飲閑則坐困則眠以此為據諸人但任麼參決不賺忤解夏小參佛以一音演說法眾生隨類各得解敢問大眾且那箇是一音所演之法莫是天是天地是地山是山水是水麼莫是春生夏長秋收冬藏麼如斯理論大似撥火覔浮漚且道是那箇一音以拂子擊禪床云一音既演直得盡乾坤大地若聖若凡情與無情聞是法音悉得悟解然雖如是唯有拂子不入這保社何故不見道山僧不會輪甲子一葉落知天下秋又擊一下上堂解開布袋頭縱橫得自由其往也無拘無束其去也南州北州放牧溈山水牯牛不風流處也風流謝兩藏主上堂拈拄杖召大眾云大藏小藏盡從這裏流出諸人若知得落處一生參學事畢其或未然且聽拄杖子從頭點出左邊卓一下云這箇是有教右邊卓一下云這箇是空教中間卓一下云這箇是中道大乘教三段不同欲釋此經向下文長付在來日又卓一下國公就本寺滿散祈禱道場禮請普說問答不錄乃云大人具大見大智得大用𮌎藏六合掌握乾坤坐碧油床被忍辱鎧執堅固箭秉智慧弓總大千世界為一戰場指百億須彌為一射垛百發百中雙放雙收掃除百萬妖魔勦絕步多惡黨便見時清道泰海晏河清八表歸仁萬入貢頓轡自樂坐鎮無憂可謂我於法王得法自在正恁麼時且道功歸何所良久云寸刃不施魔膽碎望風先已竪降旗復云佛說一切法為度一切心若無一切心何用一切法葢由一切眾生無始以來無知僻執起惑造業輪迴五趣如來出世隨宜為說處中妙理令諸有情了達諸法遠離疑執起處中行各自修滿得三菩提證寂滅樂皆由心之所作古德云只箇心心心是佛十方世界最靈物縱橫妙用可怜生一切不如心真實持五戒生人道修十善生天道皆由心作至於捨有漏入無漏棄有為入無為皆由心作葢造善造惡不同所以諸佛出世觀根逗教演說三乘法門乃至隨彼彼類現彼彼身而為說法此法惟只一法葢為有此一切心應機為說一切法雖隨根機而說於人天大會之中亦有悟無生忍者有證阿耨菩提者亦有雖在會中如聾如盲不能曉解者葢證悟有淺深得道有優劣或密說而顯演或談空而顯實或指示教外別傳之旨無非只要一切人明自心見自性證此法此法者非有非無非有無非無無若道不在說處一代時教甚處安著若道在說處且此法作麼生說須是夙有靈骨信根堅固方有趣向分是故大檀那夙乘願力篤信佛法歸敬切切盡寫藏典披閱誦持知非究竟由是力究教外別傳之旨孜孜不捨食息不忘以徹證為期是知大根器大力量再來菩薩方能如此又能剏大伽藍為國中第一甲剎廣安多眾各令知大叢林規式各令參究己躬大事各令知有教外別傳之旨甚深廣大可以續佛慧命能離生死此岸達到菩提涅槃彼岸廣度有情總令成佛常運此心愈堅愈久能如是哉老僧乃蜀生長訪道江湖有年適因法眷道舊不忘之義屢承之約累却復至以故撤去寺事暫乘良便越漠觀國之光先承國公殿特垂降接一見如故雖語音未通凡動靜往來語默酬酢心眼相照只此以見吾道眷屬而致然矣便見瞿曇老漢三百六十餘會宣說此法或人間或天上說者聽者心心相知眼眼相照與今日所說所聽等無有異所以道過去一切劫安置未來今未來現在劫回置過去世灼然參到前後際斷三祇劫空照見塵劫以來絲毫無差凡情聖量覓一絲毫了不可得所謂一念普觀無量劫無去無來亦無住如是了知三世事超諸方便成十力參學之士向這裏見徹自己本地風光本來面目歷歷分明方知一代時教句句字字不說別事與教外別傳之旨無異無別或於三乘十二分教中明得者或於教外別傳之旨明得者總是到家蹊徑教中明得者終是迂曲教外明得者不妨直截唯直截一路必能到家必到大休大歇之場盡未來際得大自在何故離心意識參出聖凡路學方謂直截者也除是大根器大力量方堪煅煉無常迅速莫作等閑古德云努力今生須了却莫教永劫受餘殃決然人身難得好時難逢知識難遇正法難聞既得人身袈裟著體好時既逢知識既遇正法既聞剗地不將為事葢是不曾種得般若種子聞似不聞見似不見遇似不遇蹉過者多盖為有此一切心所以佛說一切法山僧自春夏至秋奉意旨為國為民啟建祈禱道場日以初中後三時領大眾熏修披閱誦持專祈豐稔太平今來果遂懇祈茲辰滿散陞座為眾普說無非以此心說此法感格諸佛龍天鑒茲誠禱吉祥中吉祥殊勝中殊勝乃是此心此法之靈驗也眾中辦道兄弟為在教中明得為在教外明得往往如風過樹者多灼然不是小事佛法下衰無甚今日老僧在處叢林每見眾中辦道兄弟孜孜切切不捨晝夜以徹證大事為期或有一箇半箇挨將出來弘持大法依舊超出古今者多若是道念不堅力量不大終難希求大法豈不見趙州云諸人被十二時使惟老僧使得十二時且道他在甚處著倒是汝諸人若真箇孜孜切切只將己躬一件生死大事晝三夜三與之廝厓片時不肯放捨灼然便得十二時若只今日明日點檢張三點檢李四聽人說好便道好聽人說不好更道不好謂之矮子看戲隨人上下於自己依舊黑漫漫地空喪光陰不覺老病將至生死到來將何抵敵驢胎馬腹無可疑者葢緣虗消檀越信施枉受人天供養棄却自己工夫只說他人過惡他人若無過惡粧點強說是非以之為張三塗地獄如何逃得此是決定之義與經教所說一同且不是誑謔之語信也好不信也好老僧千錯萬錯越漠乍到此間衰晚之質語音未通無柰難却上命勉力支撑住持之職陞堂入室示眾普說雖不曾缺垂手之際自嘆枉費精神大凡出家之士置身叢林中披佛袈裟住佛屋喫佛飯須是持佛戒修佛行弘佛法續佛慧命或出來辦事輔佐叢林須是有始有終盡善盡美成就叢林典刑即是成就自己方名禪和子方可稱佛弟子若不然者何緣得大事千了百當臘月三十日到來可謂緇田無一簣之功鐵圍陷百刑之苦是誰過歟葢是道念不堅力量不大有此差別所謂佛法下衰無甚今日者是也若說此心此法說到盡未來際無有窮盡在會聽者聞者俱受龍華記別有一頌子奉為圓滿願心舉似大眾為國為民運此心果符虔禱獲豐榮時清道泰封疆闊合國歡呼賀太平上堂一塵入正定諸塵三昧起諸塵入正定一塵三昧起三昧與正受土塊泥裏洗咦白日堂堂眼見鬼非不非是不是甲子乙丑海中金丙午丁未天河水諸人若也不會且聽拄杖子當陽指示卓一下云今朝是九月一明日是初二又卓一下諸山至上堂云開爐節何可說無賓主話口含霜雪既遇知音謾且拈掇是汝諸人切不可胡亂挑撥默默守之忽然冷灰豆𪹼方知道文武火種難磨滅別山斷橋二法兄訃音至上堂南山白額虫撞倒太白峰直得西湖徹底枯竭東海怒浪翻空安漢圭峰拊掌天台尊者槌𮌎郎忙日本國裏打鼓大唐國裏撞鐘何也兄弟添十字此意孰能窮拍膝一下噓一聲下座東福法兄至上堂同飲龍囦同依師席切瑳琢磨相滋相益分袂東西各提祖令越漠來投心膽傾盡執別恰恰一周千里俯垂輝映舉眾再奉慈光無異撥雲見日若是向上向下總將靠之一壁何也憶得凌霄蠱毒之家水也不曾沾他一滴阿呵呵會也麼青山不鎻長飛勢滄海合知來處高上堂吾本來茲土傳法救迷情一花開五葉結果自然成拈云老胡授般若多羅讖記區區十萬里航海而來游梁歷魏冷坐九年以至分皮分髓將謂有多少奇特及乎付法一偈便見敗缺不少建長雖是他的傳正派兒孫不曾將脚踏他界至茲遇遠諱之臨因齋慶讚亦有一偈舉似大眾吾本來茲土無法與人傳成蛇者入草成龍者上天天台山萬年寺二童行化主至上堂人從天台來却得西川信報道萬年松生在石橋頂豐干不合饒舌累及拾得寒山奮不顧身奔南走北直趍東海龍王窟宅探扶蒼龍頷下明珠懷抱而歸廣作利益非惟照徹十虗光吞萬象直使大海變作桑田千手大悲重增光彩驚起五百大士各各從定而起擘開蒸餅峰吸盡斷橋水合掌贊言善哉善哉希有希有大唐國日本國千古之光得能超越然雖如是以拄杖打一圓相云諸人還知此大寶珠來處麼卓一下云若教容易得便作等閑看擲拄杖下座西巖訃音至上堂近得遠來口傳信報道年來頗安靜唯有太白瑞巖翁撞破虗空有雜碎驚起西川大蓬山上石女淚雙垂引得扶桑巨福山中木人空嘆息且道因甚如此良久云同飲龍囦無義水手足義重如膠漆拍膝云斷絃安得鸞膠續冬節小參圓同太虗無欠無餘良由取捨所以不如豈不見道如我按指海印發光這裏眼見鬼去不為差事設或汝暫舉心便見塵勞先起須知群陰剝盡而無剝盡之蹤一陽復生而無復生之跡既無蹤跡逈絕承當鐵樹開花撲鼻香復舉雲門和尚上堂僧問云請師答話雲門召大眾眾舉頭雲門便下座師拈云雲門任麼答話已是舌頭拖地了也雖然未舉已前薦得早是不堪持論何況葢覆將來乃高聲召大眾眾舉頭復云果然便下座冬節上堂冬至寒食一百五中有一轉平實語缺齒老胡舉不全賺他立雪人莽鹵諸人要知麼良久云猫兒偏解捉老鼠上堂臈月八夜眼見鬼便開大口說道理若向衲僧門下過爛槌一頓無疑矣莫有助拳助踢底麼操日本鄉談云和蘇嚕之最明寺殿應夢就本寺命僧看金剛經萬卷祈保天下太平請滿散陞座問答不錄乃云一切有為法如夢幻泡影如露亦如電應作如是觀驀召大眾云作是觀者名為正觀若他觀者名為邪觀若於唱教門中足可瞞神謔鬼若於衲僧門下大似鄭州出曹門雖則瞿曇老人於般若會上無中唱出豈謂後五百歲繫縛盲驢無自由分豈不見葛獠無故聞誦應無所住而生其心言下錯認驢鞍橋作阿爺下頷累及周金剛焚却一檐疏鈔便敢胡撝亂打也大無端殊不知我王庫內無如是刀須知三世諸佛說夢歷代祖師說夢一人傳虗萬人傳實遍滿西天唐土莫能止遏不覺不知流傳日本最明寺殿白日青天開眼說夢一似靈山會上親見親聞無異無別建長有氣無出處從而不識好惡向大集殿對眾與之說破清平世界切忌訛言直教天下太平兵戈絕戰國安民泰歲稔時豐飢則飡渴則飲閑則坐困則眠於事無心無心於事無欲無依豈不慶快然雖如是掬水月在手弄花香滿衣復舉舍利弗問須菩提夢中說六波羅密與覺時同別須菩提云此義幽深吾不能說此會中有彌勒大士汝往彼問拈云舍利弗開眼說夢須菩提𥧌語噡言建長憤氣不甘一時按過因成一頌舉似大眾夢中演說六波羅覺時同別苦問他今曰最明重演說更無一字有誵訛阿呵呵會也麼好是太平無事日酌然不許動干戈喝一喝徑山佛鑑忌拈香云每年三月十八憶著痛恨入骨巨福山上望凌霄萬重山海煙波闊謾爇一炷兜羅木唵引噴噴㗶㗶樗寮字阿彌陀經書偈送最明寺殿我有大經卷量等三千界親付最明殿祝壽如滄海但願得此經當下明此心的知胡達磨元不在少林最明寺殿契悟因緣壬戌十月十六朝最明啟問曰弟子近日坐禪見得非斷非常底師云參禪只圖見性若得見性方得千了百當最明曰和尚方便指示師云天下無二道聖人無兩心若識得聖人之心即是自己本源自性最明曰弟子道崇無心師云若真箇無心竪窮三際橫遍十方指燭云譬如蠟燭未澆成以前即是本地風光本來面目及至澆成點爇輝耀雅觀照徹冥暗人人瞻望末後燭盡光極依舊如前消息佛出世度人亦復如是未出世以前淨法界身本無出沒以大悲願力示現出世成道隨上中下根機演說三乘十二分教拈花示眾為令聖凡人天大眾明心見性末後入無餘涅槃亦如一條蠟燭無二無別萬古流通直至今日若見此性直下便見也良久云見麼最明曰森羅萬象山河大地與自己無二無別師云青青翠竹盡是真如黃花無非般若最明言下忽然契悟通身汗流乃曰弟子二十一年旦暮望今一時已滿足感淚數行作禮九拜師即起佛前燒香與之印可即將自身法衣一頂付之祝云公不易到箇田地宜善護持令法久住親付法衣以表燈燈相聯續佛慧命以光末運萬世愈榮次為說付法偈我無佛法一字說子亦無心無所得無說無得無心中釋迦親見燃燈佛最明寺殿悟道後師贈之助道頌五首老僧初到與三拳埋恨胷中結此冤痛恨忽消開正眼方知吾不妄宣傳悟了還同未悟時著衣喫飯順時宜起居動靜曾無別始信拈花第二機二十一年曾苦辛尋經討論枉精神驀然摸著娘生鼻翻笑胡僧弄吻唇治國治民俱外事存心存念自工夫心思路絕略觀看佛也無兮法也無壬戌十月十六朝虗空拳踢不相饒等閑打破疑團後大地黃金也合消最明夢一善知識教訓堅固參禪惺後親繪供養越兩年值老僧到先來參禮果與夢見一同契悟後捧呈所𦘕頂相求讚千煅萬煉工夫熟感得夢見善知識力勸加工用行修果獲契悟心滿足自彰醜惡自捈糊佛祖仰望俱失色老僧更與添一重咄急急如律令勑長書上最明寺殿昨使者云最明寺殿乃因大風所損百物天下萬民辛苦御心中憂閑不樂以此可見憂人不憂己乃是佛菩薩用心如此老僧雖在病中亦不憂己惟憂衲子己事未明所謂天下無二道聖人無兩心者是也佛在世時因瞿曇種族將遭大風火難所侵急來投佛免之佛云免不得何以故眾生造業之多共業所感謂之定業難逃劫數難逃若一向安樂如意者不知罪福來源也繼即瞿曇種族被風火爇盡所以佛有三能三不能者也記得古德示眾云昨日洪水大作華山崩倒湍壞了數萬人家你輩後生知什麼茄子瓠子語中有理有事有憂有不憂當時若有通方作略者只好與他掀倒禪床便見一場敗缺又記得老東山演祖云不憂諸莊旱澇惟憂禪和子不會狗子無佛性話老東山纔開臭口便見鄉談剋由尀耐又記得太宗皇帝因蝗虫大作喫盡天下萬民稻苗帝令人捉虫來自食之云只喫朕心肝莫苦我天下萬民由是蝗虫便息此亦是憂民不憂己若與老東山把手共行猶較三步在五濁惡世成劫住劫壞劫空劫輪轉不息便有大三災風災火災水災隨之欲界天色界天尚不免也又有小三災隨之病苦飢苦儉苦五濁世中必難逃矣惟有前身作福今身受也若前身作業者定定今身後身更後身受也絲毫無差所以佛出世勸人作福避罪息貪嗔癡妄念之業修戒定慧三無漏學從淺至深從凡至聖從劫至劫乃至無數劫功行圓滿必能證佛大果却來五濁世間隨機為說最上乘法悉令證入阿耨菩提亦無菩提可得亦無證入之理所以千佛萬佛唯以此法傳持佛佛祖祖無二無別況今末劫之時道不及古說道者多行道者少日本興剏宗門唯我最明寺殿再來之佛留心佛法道念堅固超越上古聖人一頭地矣禪衲中向道者多堅固者少老懷唯憂向後之弊恐不及古也諸莊旱澇亦憂大三災小三災亦憂禪和子不會狗子無佛性話亦憂自己老病亦憂未得脫回宋佚老亦憂此之千憂萬憂直憂至阿逸多下生又更添一重憂在能與老僧免得此憂否莫若憂之與樂好之與惡是之與非古之與今佛之與祖一劃劃斷便見天下太平扶病信筆上希一覧矣最明夢見寺中僧堂盡是高僧羅漢上頭一箇大棟樑惺後即發心重新鋪葢工畢上堂云檀那夢見大揀樑高僧羅漢滿雲堂慷慨重新鋪葢就比之兜率更尤強衲子辦道耐長久成佛作祖法中王下等愚迷無正念鎔銅灌口臥鐵床結制小參有處不是有無處不是無有無不到處馨香滿道塗驀召大眾云縱饒窮及到此猶未是衲僧安身立命處更說什麼三月護生九旬禁足大似布袋裏老鴉雖活如死若是丈夫志氣必然別有通方作略良久云有麼擊禪床一下云將謂春歸無覓處那知轉入此中來復舉金峰和尚示眾云二十年前有老婆心二十年後無老婆心有僧出問云如何是二十年前有老婆心峰云問凡答凡問聖答聖僧又問云如何是二十年後無老婆心峯云問凡不答凡問聖不答聖師拈云金峯年老心孤這僧有眼無耳待它任麼道便與掀倒禪床豈不俊快建長這裏縱有咬猪狗手脚底出來棒折也未放過在上堂舉智門和尚僧問蓮花未出水時如何答云蓮花出水後如何答云荷葉頌曰出水未出水心疑生暗鬼鞏縣造茶瓶一隻三箇觜上堂舉趙州僧問萬法歸一一歸何處趙州答云我在青州作得一領布衫重七斤師頌曰青州布衫重七斤由來錯認定盤星那知富士山孤峻到頂須行三日程達磨祖師忌拈香召大眾云東望大乘器區區十萬里因這一著錯累及人斷臂以香指祖師云彼錯猶且可復自指云此錯無巴鼻彼錯此錯訴之誰插香云倒拈鐵笛逆風吹徑山偃溪珏荊叟國清源靈叟等訃音至上堂㵎東一脉滔滔聒聒接於偃溪波騰嶽立甬東西湖奔湍迅速返本還源龍淵窟宅直得凌霄起舞五峰唱拍引得天台山國清寺東廊上寒山拾得颺下生苕帚拊掌呵呵金華傅大士空手把鋤頭涕淚悲泣正恁麼時諸人還知三大老為人親切處麼拍膝一下云憶著令人肝膽裂上堂舉乾峯和尚有僧問云十方薄伽梵一路涅槃門未審路頭在什麼處乾峰以拄杖畫一畫云在這裏有僧請益雲門門云扇子勃跳上三十三天築著帝釋鼻孔東海鯉黑打一棒雨似盆傾師拈云兩箇老凍儂一人渾崘吞箇棗一人蘸雪喫冬瓜引得這僧口裏水碌碌地驀拈拄杖云建長拄杖子忍俊不禁總將各各三百六十骨節八萬四千毛竅一時穿却卓一下雖然如是諸人還甘麼良久云其或未然不妨重下注脚乃云冬天日短兩人共一椀唵阿盧勒繼娑婆訶擲拄杖下座臈八上堂夜夜明星現時時兩眼開如何臈月八特地嘆奇哉引得隨邪逐惡者至今一味狗來腮退院上堂無心遊此國有心復宋國有心無心中通天路頭活舉主丈云主丈頭邊挑日月合國悲泪勸留師堅執不允部從遠送上舡列拜泣別順帆即復舊隱又被公選住持婺州雙林七次控辭不得住婺州雲黃山寶林禪寺語錄侍者景用編指三門衲僧門下活路通天脚頭脚底能方能圓召大眾云照顧踏破常住磚佛殿如何是佛殿裏底咄無端開口便臭氣掩鼻不及只得五體投地傅大士殿七佛引其前維摩接其後一盲引眾盲至今不唧𠺕咄據方丈拈拄杖示眾吽吽擲下云不信道便起拈省劄云靈山佛法付囑國王大臣有力檀那令燈燈相續綿綿不斷直至今日愈光愈顯汝等諸人各生難遭之想拱聽首座宣讀指法座向上一路千聖不傳等閑踏著不直半錢祝聖次拈香奉為太傅平章國公增崇祿位次拈香奉為判府殿撰侍郎判縣軍正寶謨郎鄉府縣文武官僚各增祿筭據座問答不錄拈拄杖云拄杖頭邊草鞋跟底隨緣放曠隱遁過時豈謂業債難逃復落他家綣繢扶病拖泥帶水只得竪四橫三乘時拽取正續山與雲黃山闘額為復是神通游戲為復是法爾如然不見道浙東山浙西水四海五湖皇化裏卓一下復舉世尊初生下來一手指天一手指地云天上天下唯我獨尊後來雲門道我當時若見一棒打殺與狗子喫貴圖天下太平拈云跛脚阿師徒有此語雙林則不然我當時若見便與兜一喝復向道黃口小兒道什麼清平世界切忌訛言當晚小參久響雙林可曾遊歷及乎到來果是殊別山環水繞寺廣人稀內空外空無彼無此彷彿威音那畔分明古佛家風不妨按下雲頭鉢囊暫且高掛坐則同坐行則同行同苦同甘同憂同樂必竟事作麼生但看人情若好自然喫水也肥復舉南泉道我十八上便解作活計趙州道我十八上便解破家散宅拈云二古德雖各擅家風未免笑破天下衲僧鼻孔雙林盡力𨁝跳也出他綣繢不得纔入門來乃見破之又破損之又損淨躶躶赤洒洒沒可把亦未免笑破天下衲僧鼻孔然雖如是或遇東君借力便有生意如何見得前村深雪裏昨夜一枝開冬夜小參破砂盆漏燈盞死偷心滅正眼近之則愈遠親之則愈疎瞻之在前忽然在後全明全暗雙放雙收番復看來當甚熱大是則也是只如進前叉手叉手進前又作麼生良久云冬行春令復拈拄杖示眾云雲門大師道從上諸聖為甚麼不到這裏蓮華峰庵主道古人到這裏為甚麼不肯住拈云把斷要津不通凡聖則不無二老要且無為人底道理雙林則不然到與不到卓拄杖一下云一時截斷且道還有為人處也無擲拄杖下座冬至上堂一陽來復暖回幽谷雲黃山上喜氣浮空綉水溪頭疎影含玉老胡不會轉身句無節目中生節目拈拄杖云累及拄丈子皮膚脫落盡通身烏律漆卓一下臈八上堂值雪正覺山前星月燦然雲黃山上霜雪凝然普天率土今古常然如何臈八忽然而然汝等諸人各宜照顧娘生鼻孔莫教打失自己眼睛免致每逢斯旦惑亂天下叢林謹白請化主上堂雲門一曲調高千古子細推窮從來無譜此曲只應天上有大士得來無本據今日當陽分付新年諸路化主在處富有知音遇著知音舉似舉似則不無且道是何曲調臈月二十五歲除小參有處不是有無處不是無有無不到處馨香滿道途古德任麼說話前不迭村後不迭店未盡善矣只如舊歲不是舊新年不是新新舊不及處堂堂獨露真且作麼生論量或有箇漢聞任麼說便道正落在古人綣繢裏又作麼生支遣當任麼時却有箇道處且作麼生道良久云舊歲今宵去新年明日來拂子擊禪床一下復舉趙州道老僧除二時粥飯是錯用心拈云三十年不下繩床將謂有多少奇特元來只在黑山下鬼窟裏作活計至今未有轉身之路若是朝三千暮八百底雙林這裏不著無凖忌拈香云這箇老漢軟頑希罕煨而不熟煑而不爛沒興遭他負累被陷雲黃苦難怨之不已恨之不休燒香云且將這箇雪冤讎結制小參去年十月十七被命來尸敗席陳逋弊積如山中外倉庫赤立勉效佛在世時持鉢㳂門求乞不憚涉險登危波波為眾竭力逗到四月十五恰滿六箇月日諸方禁足安居雙林豈容禁足領眾展轉求賢然後求己的實心空及第歸來和這自己拋擲更有一事告報古聖言端語的寧可熱鐵纏身不受信心人衣寧可鎔銅灌口不受信心人食喫飯忽咬著砂一生參學事畢若不量彼來處水也難消一滴且誵訛在什麼處拂子擊禪床一下云直待當來問彌勒舉靈樹和尚僧問如何是和尚家風曰千年田八百主如何是千年田八百主曰郎當屋舍沒人修妙喜曰愁人莫向愁人說師云正抓著雙林痒處結制上堂諸方此日安居禁足雙林難說禁足安居厨乏聚蠅之糝廩無隔宿之儲䇿杖遍叩檀度免我一眾飢虗休以蠟人為驗但願處處逢渠拍膝一下云噁早知今日事悔不慎當初天童前住首座寮結夏秉拂太白峰高佛祖仰望不及玲瓏巖險衲僧指足無門縱有掀飜四大海踢倒五須彌底作略到此總須望崖而退就中隰州古佛較些子平易中險峻險峻中平易檢點將來猶在半途終未能到頂寧上座固不敢仰視今夏得與現前一眾及此方他土微塵剎海若凡若聖情與無情於其間平不留險非取同住大光明藏宴坐圓覺妙場三期之內據菩薩乘修寂滅行壁立萬仞萬仞壁立水洒不著風吹不入如是而住如是而修如是而行如是而證是則是必竟喚什麼作平等性智以拂子擊禪床一下云玲瓏八面自回合峭峻一方誰敢窺舉米胡問僧近離甚處僧云藥山胡云藥山老子近日如何僧云大似一片頑石胡云得恁麼鄭重僧云也無你提撥處胡云非但藥山米胡亦任麼僧近前顧視而立胡云看看頑石動也僧便出師拈云米胡當斷不斷返招其亂負累者僧頑石邊蹲坐轉動不得當時待他道也無你提撥處拈棒便打若云因甚打某甲却向道頑石動也冬節秉拂道遠乎哉觸事而真目前無法意在目前聖遠乎哉體之則神不是目前法非耳目之所到所以靈山密付取聲安置篋中少室單傳吹網欲令氣滿自餘行棒行喝全提半提總是撒土拋沙欺賢罔聖眾中猛烈丈夫各各氣衝牛斗豈可甘受屈辱乘時裂轉面皮當陽決斷貴要君子道長小人道消從教運推移日南長至氷河起焰寒谷回春一塵蜚而翳天一芥墮而覆地雖然因甚玲瓏巖依舊聳青空良久云直恐虗心自天意人間穿鑿枉工夫舉道吾離藥山到南泉著語云門內有君子門外君子至南泉問云闍黎名什麼吾云宗智相見易得好共住難為人南泉云智不到處作麼生宗賊被賊捉吾云切忌道著一欵便招南泉云灼然道著即頭角生賊無種相鼓籠至三日後道吾在後架與雲巖把針次南泉過見乃再問云前日道智不到處切忌道著道著即頭角生合作麼生行履貧兒思舊債道吾抽身入僧堂南泉便去君向西秦我之東魯道吾却來坐雲巖乃問云師弟適來為甚不祗對和尚吾云你得恁麼伶利磚頭來瓦子報巖不薦却去問南泉云適來因緣智頭陀作麼生不祗對和尚南泉云他却是異類中行檐得一檐懵懂換得一檐骨懂巖云如何是異類中行泉云不見道智不到處切忌道著道著即頭角生直須向異類中行第二杓惡水巖亦不會道吾知巖不薦乃云此人因緣不任此便與回藥山一盲引眾盲相牽入火坑藥山覩二人回乃問雲巖汝到甚處去來巖云到南泉來藥山云南泉有何言句雲巖遂舉前話拾得封皮作信讀藥山云子作麼生會他這箇時節便回來雲巖無對藥山乃大笑盡道藥山笑裏有刀殊不知怜兒不覺醜雲巖便問如何是異類中行藥山云吾今日困別時來舌頭拖地雲巖云某甲特為此事歸來藥山云且去雲巖便出教休不肯休直待雨霖頭道吾在方丈外聞雲巖不薦不覺咬得指頭血出為他閑事長無明道吾却下來問雲巖云師兄去問和尚那因緣作麼雲巖云和尚不與某甲說道吾便低頭臨袁䖍吉頭上插笔後雲巖遷化遣遺書至道吾覽了曰雲巖不知有悔當時不向伊道然雖如是要且不違藥山之子同死同生為君決師拈云道吾雲巖可謂蚌鷸相持俱落漁人之手南泉藥山正令不行拗曲作直當時若使德山令行曹洞一宗未至掃土復成一頌往復落人綣繢間那知同步不同行當初乍可無容質別作心腸過一生靈隱前堂首座寮結夏秉拂語漸也返常合道方木逗圓孔論頓也不留朕跡泥裏洗土塊所以一機一境總是接響承虗舉古舉今特地無風起浪豈不見道杜耳目於胎殻掩玄象於霄外貴宮商之異辯玄素之殊雖則盡力𨁝跳要且前不迭村後不迭店縱使據菩薩乘修寂滅行高步毗盧頂不稟釋迦文亦未出靈山綣繢在是則是只如五祖和尚道羅邏招羅邏搖羅邏送莫恠空疎伏惟珍重又作麼生良久云不逢別者終不開拳舉保福和尚因長生卓庵時去相訪茶話次長生云有僧問某甲如何是祖師西來意某甲竪起拂子不知得不得保福云某甲爭敢道得不得有箇問有人讚嘆此事如虎帶角有人輕毀此事分文不直一等是任麼事為甚讚毀不同長生云適來出自偶爾有老宿云毀又爭得有老宿云惜取眉毛後來雪竇都別云若非和尚證明拂子一生無用玄覺云一等是與麼事為什麼有得有不得孚上座云若無智眼難辯得失師拈云雪竇玄覺等是口甜心苦半似輕毀半似讚嘆引得孚上座無端插觜拂子忍俊不禁今夜對眾決破讚之與毀得與不得以拂子擊禪床一下云甚處得來然雖如是惜取眉毛
